<!DOCTYPE html>

<head>

    <meta name="robots" content="noindex,nofollow">
    <title id="page-title">微電網救援行動 - 碳吉工程師出動</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; overscroll-behavior-y: none; background-color: #020617; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .fade-out { animation: fadeOut 0.4s ease-out forwards; }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); filter: blur(0); } to { opacity: 0; transform: scale(0.95); filter: blur(4px); display: none; } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="h-[100dvh] w-full flex justify-center items-center overflow-hidden">

    <div id="app-container" class="w-full max-w-md h-full relative bg-[#0B1120] shadow-2xl flex flex-col overflow-hidden sm:border-x sm:border-slate-800">
        
        <!-- 全域 右下角說明按鈕 -->
        <button onclick="openHelp()" class="absolute bottom-10 right-4 z-[90] bg-slate-800/80 backdrop-blur-md text-slate-300 p-2.5 rounded-full border border-slate-600 hover:bg-slate-700 hover:text-white transition-all shadow-lg active:scale-95">
            <i data-lucide="help-circle" class="w-6 h-6"></i>
        </button>

        <!-- 說明彈出視窗 (Modal) -->
        <div id="help-modal" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-[110] hidden flex-col items-center justify-center p-6 text-white transition-opacity">
            <div class="bg-slate-900 border border-slate-700 p-5 rounded-2xl shadow-2xl w-full max-w-[320px] relative">
                <button onclick="closeHelp()" class="absolute top-4 right-4 text-slate-400 hover:text-white active:scale-95 transition-transform">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <h3 class="text-xl font-black text-emerald-400 mb-4 flex items-center gap-2" id="help-title">
                    <i data-lucide="book-open" class="w-5 h-5"></i> 遊戲說明
                </h3>
                <div id="help-content" class="text-sm text-slate-300 space-y-3">
                    <!-- 內容由 i18n 載入 -->
                </div>
                <button onclick="closeHelp()" class="w-full mt-5 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-xl font-bold transition-colors" id="help-close-btn">
                    了解！
                </button>
            </div>
        </div>

        <!-- 1. 介紹畫面 (首頁) -->
        <div id="screen-intro" class="absolute inset-0 bottom-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-[#0B1120] to-black z-50 flex flex-col items-center justify-center px-5 text-white transition-all overflow-hidden">
            <button onclick="toggleLang()" class="absolute top-4 right-4 z-[100] bg-white/10 backdrop-blur-md text-slate-200 px-3 py-1.5 rounded-full text-sm font-bold border border-white/10 hover:bg-white/20 transition-all flex items-center gap-1.5 shadow-lg">
                <i data-lucide="globe" class="w-4 h-4"></i> <span id="lang-btn-text">EN</span>
            </button>

            <div class="relative mb-4 flex flex-col items-center mt-2">
                <div class="mb-3 px-4 py-1.5 rounded-full border border-red-500/30 bg-red-500/10 text-red-400 flex items-center gap-2 animate-pulse">
                    <i data-lucide="triangle-alert" class="w-4 h-4"></i>
                    <span class="font-bold text-sm tracking-widest" id="intro-alert">外部電網異常</span>
                </div>
                <div class="w-40 h-40 md:w-48 md:h-48 animate-float relative z-10">
                    <img src="https://raw.githubusercontent.com/tanji2026/ccus/main/tanjibaby.png" alt="碳吉" class="w-full h-full object-contain filter drop-shadow-[0_10px_20px_rgba(16,185,129,0.3)]">
                </div>
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl z-0"></div>
            </div>

            <div class="space-y-5 text-center w-full max-w-[320px] relative z-10">
                <h1 class="text-3xl sm:text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-teal-400" id="intro-title">微電網救援行動</h1>
                <p class="text-slate-300 font-bold text-base tracking-widest leading-relaxed" id="intro-subtitle">
                    主系統故障！我是工程師碳吉。<br>請協助接管區域能源管理系統。
                </p>
                <button onclick="startGame()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-8 py-3.5 rounded-full font-black tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.3)] pulse-glow active:scale-95 transition-all flex justify-center items-center gap-2 mt-4 text-lg">
                    <span id="intro-btn-text">啟動 EMS 系統</span> <i data-lucide="power" class="w-5 h-5"></i>
                </button>
                <button onclick="openLeaderboard()" class="w-full text-emerald-400 font-bold text-sm tracking-widest hover:text-emerald-300 transition-colors mt-2" id="intro-btn-rank">
                    🏆 觀看戰情室排行榜
                </button>
            </div>
        </div>

        <!-- 2. 遊戲主畫面 -->
        <div id="screen-game" class="absolute inset-0 bottom-8 hidden flex-col bg-[#0B1120] z-40">
            <!-- 頂部儀表板 -->
                <div class="absolute top-0 left-0 h-2 bg-gradient-to-r from-blue-400 via-emerald-400 to-indigo-500 w-0 transition-all duration-1000 shadow-[0_0_12px_rgba(52,211,153,1)] rounded-r-full z-10"></div>

                <div class="flex justify-between items-center mt-1">
                    <div class="flex flex-col">
                        <span class="text-[10px] sm:text-xs text-slate-400 font-bold tracking-wider uppercase mb-0.5 flex items-center gap-2">
                            <span id="game-time-label">虛擬時間 (24H)</span>
                            <span id="ui-event-banner" class="hidden text-[10px] px-1.5 py-0.5 rounded bg-slate-800 border border-slate-600 font-bold whitespace-nowrap text-slate-300"><i data-lucide="zap" class="w-3 h-3 inline text-amber-400 animate-pulse"></i> <span id="ui-event-text">天氣突變！</span></span>
                        </span>
                        <div class="flex items-center gap-2 tracking-tight" id="ui-clock-container">
                            <i data-lucide="sun" id="time-icon" class="w-5 h-5 sm:w-6 sm:h-6 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]"></i>
                            <span class="text-xl sm:text-2xl font-black text-white font-mono" id="ui-virtual-time">00:00</span>
                            <!-- 新增：真實秒數倒數標籤 -->
                            <span class="ml-1 px-1.5 py-0.5 bg-slate-800/80 text-emerald-400 text-[10px] sm:text-xs rounded-md border border-slate-600 font-mono flex items-center gap-1">
                                <i data-lucide="timer" class="w-3 h-3 sm:w-3.5 sm:h-3.5"></i> <span id="ui-real-time">60s</span>
                            </span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] sm:text-xs text-slate-400 font-bold tracking-wider uppercase mb-0.5" id="game-score-title">當前績效</span>
                        <div class="text-lg sm:text-xl font-black text-emerald-400 font-mono flex items-center gap-1">
                            <span id="ui-total-score">0</span> <span class="text-[10px] sm:text-xs text-emerald-600">pts</span>
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-1.5 bg-black/40 p-1.5 rounded-lg border border-white/5 relative mt-0.5">
                    <div class="text-center">
                        <div class="text-[10px] text-slate-400 font-bold tracking-wide" id="game-solar-label">太陽能</div>
                        <div class="text-sm font-black text-yellow-400 font-mono mt-0.5" id="ui-solar">0</div>
                    </div>
                    <div class="text-center border-l border-r border-white/5">
                        <div class="text-[10px] text-slate-400 font-bold tracking-wide" id="game-wind-label">風力</div>
                        <div class="text-sm font-black text-cyan-400 font-mono mt-0.5" id="ui-wind">100</div>
                    </div>
                    <div class="text-center">
                        <div class="text-[10px] text-slate-400 font-bold tracking-wide" id="game-load-label">總負載</div>
                        <div class="text-sm font-black text-rose-400 font-mono mt-0.5" id="ui-draw">400</div>
                    </div>
                </div>
            </div>

            <!-- 電池狀態區 (字體放大、血條加粗) -->
            <div class="px-4 py-2.5 flex flex-col gap-1.5 relative z-10">
                <div class="flex justify-between items-end mb-0.5">
                    <span class="text-xs font-bold text-slate-400 tracking-wider uppercase" id="game-net-label">ESS 淨流向</span>
                    <span id="ui-net-power" class="font-mono text-sm sm:text-base tracking-tight font-black text-rose-400">-150 kW</span>
                </div>

                    <div id="ui-battery-bar" class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 w-full transition-all duration-300"></div>
                </div>
                <div class="text-right text-[10px] sm:text-xs text-slate-500 font-mono font-bold mt-0.5">
                    <span id="ui-battery-text" class="text-slate-200">3000 / 6000</span> kWh
                </div>
            </div>

                <!-- 備用發電機卡片 (放大按鈕與文字) -->
                <div class="bg-gradient-to-r from-slate-800/80 to-slate-900/80 backdrop-blur-md rounded-xl border border-amber-500/30 p-2 shadow-sm relative overflow-hidden flex-shrink-0 cursor-pointer active:scale-[0.98] transition-transform" onclick="toggleGenerator()">
                    <div id="gen-bg-fx" class="absolute inset-0 bg-amber-500/10 hidden animate-pulse"></div>
                    <div class="flex justify-between items-center relative z-10 px-1">
                        <div class="flex items-center gap-3">
                            <div id="gen-icon-bg" class="bg-slate-800/80 border border-slate-700 w-9 h-9 rounded-lg flex items-center justify-center shadow-inner flex-shrink-0 transition-colors">
                                <i data-lucide="flame" id="gen-icon" class="w-4 h-4 sm:w-5 sm:h-5 text-slate-500 transition-colors"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-0.5">
                                    <h3 class="font-bold text-xs sm:text-sm text-amber-500" id="game-gen-name">備用發電機</h3>
                                </div>
                                <div class="text-[10px] sm:text-xs font-mono font-bold flex gap-2">
                                    <span class="text-emerald-400">+200 kW</span>
                                    <span class="text-red-400" id="game-gen-cost">-10 碳排/秒</span>
                                </div>
                            </div>
                        </div>
                        <!-- 放大 Toggle -->
                        <div id="gen-toggle-bg" class="w-10 h-6 rounded-full bg-slate-700 relative transition-colors shadow-inner flex items-center p-1 border border-slate-600 flex-shrink-0">
                            <div id="gen-toggle-dot" class="w-4 h-4 rounded-full bg-slate-300 shadow-sm transform transition-transform duration-300 translate-x-0"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 10個設施高密度雙欄網格 (放大字體與按鈕) -->
                <div id="facilities-container" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>

        <!-- 3. 結算畫面 -->
        <div id="screen-result" class="absolute inset-0 bottom-8 glass-panel z-[60] hidden flex-col items-center justify-center p-6 text-white no-scrollbar overflow-y-auto">
            <div class="flex flex-col items-center w-full max-w-[320px]">
                <div id="result-icon" class="w-20 h-20 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(0,0,0,0.5)]"></div>
                <h2 id="result-title" class="text-3xl sm:text-4xl font-black mb-2 text-center tracking-wide"></h2>
                <p id="result-desc" class="text-slate-300 text-center mb-5 text-sm sm:text-base px-2 leading-relaxed"></p>

                <div id="score-section" class="w-full hidden bg-[#0F172A] p-5 rounded-2xl border border-slate-700/50 shadow-2xl mb-4">
                    <div class="text-center mb-4 pb-4 border-b border-slate-800">
                        <div class="text-xs text-slate-500 font-bold mb-1 tracking-widest uppercase" id="res-score-label">綜合績效分數</div>
                        <div class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 font-mono" id="result-score">0</div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-y-3 gap-x-2 mb-5 text-xs sm:text-sm font-mono font-bold">
                        <div class="text-slate-500" id="res-stat-sat">經濟產值得分</div><div class="text-right text-blue-400" id="res-val-sat">+0</div>
                        <div class="text-slate-500" id="res-stat-car">碳排懲罰</div><div class="text-right text-red-400" id="res-val-car">-0</div>
                        <div class="text-slate-500" id="res-stat-bat">剩餘電量獎勵</div><div class="text-right text-emerald-400" id="res-val-bat">+0</div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-2 tracking-widest uppercase" id="res-name-label">指揮官代號</label>
                            <input type="text" id="player-name" class="w-full bg-black/50 border border-slate-700 rounded-xl px-4 py-3.5 mt-1 text-white font-bold focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-center text-base" maxlength="10">
                        </div>
                        <button onclick="submitToFirebase()" id="btn-submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-bold tracking-widest shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2 text-base">
                            <span id="res-btn-submit-text">發布至戰情室</span> <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <button id="btn-restart" onclick="resetGame()" class="text-slate-400 hover:text-white font-bold tracking-widest text-sm transition-colors hidden mt-2">
                    <span id="res-btn-restart">重新挑戰</span>
                </button>
            </div>
        </div>

        <!-- 4. 排行榜 (戰情室) -->
        <div id="screen-leaderboard" class="absolute inset-0 bottom-8 bg-[#0B1120] z-[70] hidden flex-col transition-all">
            <div class="px-5 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-md">
                <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 flex items-center gap-2" id="lb-title">
                    <i data-lucide="trophy" class="w-5 h-5 text-emerald-400"></i> 戰情室排行榜
                </h2>
                <button onclick="closeLeaderboard()" class="text-slate-400 hover:text-white transition-colors active:scale-95">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar" id="leaderboard-list">
                <div class="flex items-center justify-center h-32 text-slate-500 text-base font-bold animate-pulse">
                    <i data-lucide="loader-2" class="w-6 h-6 mr-2 animate-spin"></i> 載入資料中...
                </div>
            </div>
        </div>

        <!-- 底部版權 -->
        <div class="absolute bottom-0 w-full h-8 flex items-center justify-center bg-slate-950 border-t border-slate-900 z-[100] px-2">
            <p class="text-[8px] sm:text-[10px] text-slate-600 font-medium text-center truncate w-full tracking-wider" id="global-footer">

            </p>
        </div>

    </div>

        function updateDashboard() {
            let elapsed = 60 - state.time;
            let virtualHour = Math.floor((elapsed / 60) * 24);
            let virtualMin = Math.floor((((elapsed / 60) * 24) % 1) * 60);
            
            document.getElementById('ui-virtual-time').innerText = 
                String(virtualHour).padStart(2, '0') + ':' + String(virtualMin).padStart(2, '0');
            // 同步顯示真實倒數秒數
            document.getElementById('ui-real-time').innerText = state.time + 's';
            
            document.getElementById('time-progress-bar').style.width = `${(elapsed/60)*100}%`;

            let sunFactor = Math.sin(Math.PI * (elapsed / 60));
            if (sunFactor < 0) sunFactor = 0;
            state.solarCurrent = Math.floor(sunFactor * 450 * state.solarMod);
            
            const timeIcon = document.getElementById('time-icon');
            if (virtualHour >= 6 && virtualHour < 18) {
                timeIcon.setAttribute('data-lucide', 'sun');
                timeIcon.className = "w-5 h-5 sm:w-6 sm:h-6 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]";
            } else {
                timeIcon.setAttribute('data-lucide', 'moon');

            }
            lucide.createIcons();

            let totalDraw = 0;
            state.facilities.forEach(f => {
                if (f.isOn) totalDraw += f.draw;
            });
            
            let supply = state.solarCurrent + state.windCurrent;
            if (state.genOn) supply += 200;

            let netPower = Math.floor(supply - totalDraw);
            
            document.getElementById('ui-draw').innerText = totalDraw;
            document.getElementById('ui-solar').innerText = state.solarCurrent;
            document.getElementById('ui-wind').innerText = Math.floor(state.windCurrent);
            
            const netEl = document.getElementById('ui-net-power');

                netEl.innerText = '+' + netPower + ' kW';

            } else {

                netEl.className = 'font-mono text-sm sm:text-base tracking-tight font-black text-rose-400';
            }

            let totalScore = Math.floor(state.satisfaction) - state.carbon;
            document.getElementById('ui-total-score').innerText = totalScore;
            
            document.getElementById('ui-battery-text').innerHTML = `<span class="text-slate-200">${Math.floor(state.battery)} / ${state.maxBattery}</span>`;
            
            const pct = Math.max(0, (state.battery / state.maxBattery) * 100);
            const bar = document.getElementById('ui-battery-bar');
            bar.style.width = `${pct}%`;
            
            if (pct > 50) {
                bar.className = 'h-full bg-gradient-to-r from-emerald-500 to-teal-400 w-full transition-all duration-300 shadow-[0_0_12px_rgba(52,211,153,0.8)] rounded-r-full';
            } else if (pct > 20) {
                bar.className = 'h-full bg-gradient-to-r from-amber-400 to-yellow-500 w-full transition-all duration-300 shadow-[0_0_12px_rgba(250,204,21,0.8)] rounded-r-full';
            } else {
                bar.className = 'h-full bg-gradient-to-r from-rose-500 to-red-600 w-full transition-all duration-300 shadow-[0_0_12px_rgba(244,63,94,0.8)] animate-pulse rounded-r-full';
            }
        }

        function gameTick() {
            if (state.status !== 'playing') return;

            let totalDraw = 0;
            state.facilities.forEach(f => { 
                if (f.isOn) {
                    totalDraw += f.draw;
                    if (!f.critical) state.satisfaction += (f.draw / 10);
                } else {
                    if (!f.critical) state.satisfaction -= (f.draw / 15);
                }
            });

            if (state.genOn) state.carbon += 10;

            if (Math.random() > 0.5) {
                let baseWind = 100 * state.windMod;
                state.windCurrent = Math.max(0, baseWind + (Math.random() * 40 - 20));
            }

            eventTimer++;
            if (eventTimer >= 10) {
                triggerEvent();
                eventTimer = 0;
            }

            let supply = state.solarCurrent + state.windCurrent;
            if (state.genOn) supply += 200;

            let netPower = supply - totalDraw;
            state.battery += netPower;
            if (state.battery > state.maxBattery) state.battery = state.maxBattery;
            
            state.time -= 1;

            if (state.battery <= 0) {
                state.battery = 0;
                updateDashboard();
                gameOver('battery_dead');
                return;
            }

            if (state.time <= 0) {
                state.time = 0;
                updateDashboard();
                victory();
                return;
            }

            updateDashboard();
        }

            let satScore = Math.floor(state.satisfaction);
            let carScore = state.carbon;

            state.finalScore = satScore - carScore + batBonus;
            
            document.getElementById('result-score').innerText = state.finalScore;
            document.getElementById('res-val-sat').innerText = `+${satScore}`;
            document.getElementById('res-val-car').innerText = `-${carScore}`;
            document.getElementById('res-val-bat').innerText = `+${batBonus}`;
            
            updateResultText();
            lucide.createIcons();
        }

        window.resetGame = function() {
            document.getElementById('screen-result').style.display = 'none';
            document.getElementById('screen-intro').style.display = 'flex';
            document.getElementById('screen-intro').classList.remove('fade-out');
            document.getElementById('screen-intro').classList.add('fade-in');
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('time-progress-bar').style.width = '0%';
        };

        window.submitToFirebase = async function() {
            const t = i18n[currentLang];
            const name = document.getElementById('player-name').value.trim();
            const btn = document.getElementById('btn-submit');
            
            if (!name) { alert(t.alertName); return; }
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
            btn.disabled = true;
            lucide.createIcons();
            
            try {
                // 將成績寫入自己專案的 Firestore
                await addDoc(collection(db, 'leaderboard'), {
                    name: name,
                    score: state.finalScore,
                    batteryLeft: Math.floor(state.battery),
                    timestamp: serverTimestamp()
                });
                
                btn.innerHTML = `<span id="res-btn-submit-text">${t.resBtnSubmit}</span> <i data-lucide="send" class="w-4 h-4 ml-1"></i>`;
                btn.disabled = false;
                document.getElementById('player-name').value = '';
                
                document.getElementById('screen-result').style.display = 'none';
                openLeaderboard();
                
            } catch(e) {
                console.error("Upload Error:", e);
                alert("上傳失敗，請確認 Firebase 設定檔是否正確：" + e.message);
                btn.innerHTML = `<span id="res-btn-submit-text">${t.resBtnSubmit}</span> <i data-lucide="send" class="w-4 h-4 ml-1"></i>`;
                btn.disabled = false;
            }
        };

        // --- 排行榜邏輯 ---
        let lbUnsubscribe = null;
        
        window.openLeaderboard = function() {
            document.getElementById('screen-intro').style.display = 'none';
            const lbScreen = document.getElementById('screen-leaderboard');
            lbScreen.classList.remove('hidden');
            lbScreen.classList.add('flex', 'fade-in');
            
            const q = collection(db, 'leaderboard');
            lbUnsubscribe = onSnapshot(q, (snapshot) => {
                const list = document.getElementById('leaderboard-list');
                const t = i18n[currentLang];
                
                if (snapshot.empty) {
                    list.innerHTML = `<div class="flex items-center justify-center h-32 text-slate-500 text-lg font-bold">${t.lbEmpty}</div>`;
                    return;
                }
                
                let records = [];
                snapshot.forEach(doc => { records.push(doc.data()); });
                
                records.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return b.batteryLeft - a.batteryLeft;
                });
                
                records = records.slice(0, 10);
                
                list.innerHTML = '';
                records.forEach((r, idx) => {
                    const isTop3 = idx < 3;
                    const rankColor = idx === 0 ? 'text-yellow-400' : (idx === 1 ? 'text-slate-300' : (idx === 2 ? 'text-amber-600' : 'text-slate-500'));
                    
                    list.innerHTML += `
                        <div class="bg-slate-800/80 backdrop-blur-sm border border-slate-700/50 p-4 rounded-xl flex items-center justify-between animate-fade-in shadow-sm">
                            <div class="flex items-center gap-4">
                                <div class="w-8 font-black ${rankColor} text-xl text-center">#${idx + 1}</div>
                                <div class="font-bold text-slate-200 truncate max-w-[140px] sm:max-w-[180px] text-base">${r.name || 'Anonymous'}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-mono font-black text-emerald-400 text-xl">${r.score || 0} <span class="text-[11px] text-emerald-600">pts</span></div>
                            </div>
                        </div>
                    `;
                });
            }, (error) => {
                console.error("Leaderboard Sync Error:", error);
                document.getElementById('leaderboard-list').innerHTML = `<div class="text-red-400 text-center mt-10 text-sm">無法連接資料庫，請檢查 Firebase 設定</div>`;
            });
        };

        window.closeLeaderboard = function() {
            const lbScreen = document.getElementById('screen-leaderboard');
            lbScreen.classList.add('hidden');
            lbScreen.classList.remove('flex', 'fade-in');
            
            if (lbUnsubscribe) { lbUnsubscribe(); lbUnsubscribe = null; }
            
            document.getElementById('screen-intro').style.display = 'flex';
            document.getElementById('screen-intro').classList.remove('fade-out');
            document.getElementById('screen-intro').classList.add('fade-in');
        };

        // 初始化
        updateStaticText();
    </script>
</body>
</html>
