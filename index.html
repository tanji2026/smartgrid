    <meta charset="UTF-8">

    <meta name="robots" content="noindex,nofollow">
    <title id="page-title">微電網救援行動 - 碳吉工程師出動</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; overscroll-behavior-y: none; background-color: #020617; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .fade-out { animation: fadeOut 0.4s ease-out forwards; }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); filter: blur(0); } to { opacity: 0; transform: scale(0.95); filter: blur(4px); display: none; } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>

<body class="h-[100dvh] w-full flex justify-center items-center overflow-hidden">

    <div id="app-container" class="w-full max-w-md h-full relative bg-[#0B1120] shadow-2xl flex flex-col overflow-hidden sm:border-x sm:border-slate-800">
        
        <!-- 全域 右下角說明按鈕 -->
        <button onclick="openHelp()" class="absolute bottom-12 right-4 z-[90] bg-slate-800/80 backdrop-blur-md text-slate-300 p-3 rounded-full border border-slate-600 hover:bg-slate-700 hover:text-white transition-all shadow-lg active:scale-95">
            <i data-lucide="help-circle" class="w-6 h-6"></i>
        </button>

        <!-- 說明彈出視窗 (Modal) -->
        <div id="help-modal" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-[110] hidden flex-col items-center justify-center p-6 text-white transition-opacity">
            <div class="bg-slate-900 border border-slate-700 p-5 rounded-2xl shadow-2xl w-full max-w-[320px] relative">
                <button onclick="closeHelp()" class="absolute top-4 right-4 text-slate-400 hover:text-white active:scale-95 transition-transform">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <h3 class="text-xl font-black text-emerald-400 mb-4 flex items-center gap-2" id="help-title">
                    <i data-lucide="book-open" class="w-5 h-5"></i> 遊戲說明
                </h3>
                <div id="help-content" class="text-sm text-slate-300 space-y-3">
                    <!-- 內容由 i18n 載入 -->
                </div>
                <button onclick="closeHelp()" class="w-full mt-5 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-xl font-bold transition-colors" id="help-close-btn">

            </div>
        </div>

        <div id="screen-intro" class="absolute inset-0 bottom-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-[#0B1120] to-black z-50 flex flex-col items-center justify-center px-5 text-white transition-all overflow-hidden">
            
            <button onclick="toggleLang()" class="absolute top-4 right-4 z-[100] bg-white/10 backdrop-blur-md text-slate-200 px-3 py-1.5 rounded-full text-xs font-bold border border-white/10 hover:bg-white/20 transition-all flex items-center gap-1.5 shadow-lg">
                <i data-lucide="globe" class="w-3.5 h-3.5"></i> <span id="lang-btn-text">EN</span>

            <div class="relative mb-6 flex flex-col items-center mt-2">

                    <i data-lucide="triangle-alert" class="w-4 h-4"></i>
                    <span class="font-bold text-sm tracking-widest" id="intro-alert">外部電網異常</span>
                </div>
                <div class="w-40 h-40 md:w-48 md:h-48 animate-float relative z-10">
                    <img src="https://raw.githubusercontent.com/tanji2026/ccus/main/tanjibaby.png" alt="碳吉" class="w-full h-full object-contain filter drop-shadow-[0_10px_20px_rgba(16,185,129,0.3)]">
                </div>
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl z-0"></div>
            </div>

            <div class="space-y-6 text-center w-full max-w-[320px] relative z-10">
                <h1 class="text-3xl sm:text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-teal-400" id="intro-title">微電網救援行動</h1>
                
                <p class="text-slate-300 font-bold text-sm tracking-widest" id="intro-subtitle">
                    主系統故障！我是工程師碳吉。<br>請協助接管區域能源管理系統。
                </p>

                <button onclick="startGame()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-8 py-4 rounded-full font-black tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.3)] pulse-glow active:scale-95 transition-all flex justify-center items-center gap-2 mt-4">
                    <span id="intro-btn">啟動 EMS 系統</span> <i data-lucide="power" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- 2. 遊戲主畫面 -->
        <div id="screen-game" class="absolute inset-0 bottom-8 hidden flex-col bg-[#0B1120] z-40">
            <!-- 頂部儀表板 -->
            <div class="glass-panel border-b-0 py-2 px-3 flex flex-col gap-2 shadow-lg z-20 relative rounded-b-2xl">
                <div class="absolute top-0 left-0 h-1 bg-slate-800 w-full"></div>
                <div id="time-progress-bar" class="absolute top-0 left-0 h-1 bg-gradient-to-r from-blue-400 via-emerald-400 to-indigo-500 w-0 transition-all duration-1000 shadow-[0_0_10px_rgba(52,211,153,0.8)]"></div>

                <div class="flex justify-between items-center mt-1">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-slate-400 font-bold tracking-wider uppercase mb-0.5" id="game-time-label">虛擬時間 (24H)</span>
                        <div class="text-xl font-black text-white font-mono flex items-center gap-1.5 tracking-tight" id="ui-clock-container">
                            <i data-lucide="sun" id="time-icon" class="w-4 h-4 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]"></i>
                            <span id="ui-virtual-time">00:00</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] text-slate-400 font-bold tracking-wider uppercase mb-0.5" id="game-score-title">當前績效</span>
                        <div class="text-lg font-black text-emerald-400 font-mono flex items-center gap-1">

                        </div>
                        <div class="flex gap-2 text-[9px] font-mono justify-end mt-0.5 font-bold">

                    </div>

                    </div>

                    <div class="text-center">
                        <div class="text-[8px] text-slate-500 font-bold" id="game-solar-label">太陽能</div>
                        <div class="text-xs font-black text-yellow-400 font-mono mt-0.5" id="ui-solar">0</div>
                    </div>
                    <div class="text-center border-l border-r border-white/5">

                    <div class="text-center">
                        <div class="text-[8px] text-slate-500 font-bold" id="game-load-label">總負載</div>

                    </div>
                </div>
            </div>

                                </div>
                            </div>
                        </div>

                            <span id="res-btn-submit">發布至戰情室</span> <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <button id="btn-restart" onclick="resetGame()" class="text-slate-500 hover:text-white font-bold tracking-widest text-xs transition-colors hidden">
                    <span id="res-btn-restart">重新挑戰</span>
                </button>
            </div>
        </div>

        <div class="absolute bottom-0 w-full h-8 flex items-center justify-center bg-slate-950 border-t border-slate-900 z-[100] px-2">
            <p class="text-[8px] sm:text-[9px] text-slate-600 font-medium text-center truncate w-full tracking-wider" id="global-footer">

            </p>
        </div>

    </div>

                genBadge: "High Carbon",
                genCost: "-10 CO2/s",
                resScoreLabel: "Total Score",
                resNameLabel: "Commander ID",
                resNamePlaceholder: "Enter your name",
                resBtnSubmit: "Publish Score",
                resBtnRestart: "Try Again",
                statSat: "Economic Score",
                statCar: "Carbon Penalty",
                statBat: "Battery Bonus",
                footer: "Energy Economics - Smart Grids | Copyright Protected | Contact: tanji2026@gmail.com",
                failTitle: "Mission Failed",
                successTitle: "Rescue Successful!",
                failHospital: "TanJi: Oh no! You cut power to the hospital!<br>Patients are in danger, mission failed...",
                failBattery: "TanJi: Battery depleted!<br>The microgrid collapsed, we couldn't make it...",
                successDesc: "TanJi: Great job! We survived the day.<br>Smart dispatching protected the hospital!",
                alertName: "Please enter Commander ID!",
                alertSuccess: "Upload Successful!\nPlayer: {0}\nTotal Score: {1}",
                events: {
                    cloudy: "Clouds! Solar Drops",
                    windy: "Strong Winds! Wind Surge",
                    sunny: "Clear Sky! Solar Max",
                    nowind: "No Wind! Wind Stops",
                    stable: "Weather Stable"
                }
            }
        };

        const FACILITY_CONFIG = [
            { id: 'hospital', name: { zh: '地區醫院', en: 'Hospital' }, icon: 'cross', draw: 60, critical: true, color: 'rose' },
            { id: 'factory', name: { zh: '重型工業區', en: 'Factory' }, icon: 'factory', draw: 120, critical: false, color: 'amber' },
            { id: 'mall', name: { zh: '大型商場', en: 'Shopping Mall' }, icon: 'shopping-cart', draw: 70, critical: false, color: 'blue' },
            { id: 'residential', name: { zh: '住宅社區', en: 'Residential' }, icon: 'home', draw: 50, critical: false, color: 'indigo' }
        ];

        let currentLang = 'zh';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('lang-btn-text').innerText = currentLang === 'zh' ? 'EN' : '中';
            updateStaticText();
        }

        function openHelp() {
            const modal = document.getElementById('help-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex', 'fade-in');
            
            // 如果在遊戲中打開說明，暫停計時
            if (state.status === 'playing' && timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function closeHelp() {
            const modal = document.getElementById('help-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex', 'fade-in');
            
            // 如果在遊戲中關閉說明，恢復計時
            if (state.status === 'playing' && !timerInterval) {
                timerInterval = setInterval(gameTick, 1000);
            }
        }

        function updateStaticText() {
            const t = i18n[currentLang];
            document.getElementById('page-title').innerText = t.pageTitle;
            document.getElementById('intro-alert').innerText = t.introAlert;
            document.getElementById('intro-title').innerText = t.introTitle;
            document.getElementById('intro-subtitle').innerHTML = t.introSubtitle;
            document.getElementById('intro-btn').innerHTML = `${t.introBtn} <i data-lucide="power" class="w-4 h-4 ml-1"></i>`;
            
            document.getElementById('help-title').innerHTML = `<i data-lucide="book-open" class="w-5 h-5"></i> ${t.helpTitle}`;
            document.getElementById('help-content').innerHTML = t.helpContent;
            document.getElementById('help-close-btn').innerText = t.helpClose;

            document.getElementById('game-time-label').innerText = t.gameTime;
            document.getElementById('game-score-title').innerText = t.gameSat;
            document.getElementById('game-solar-label').innerText = t.gameSolar;
            document.getElementById('game-wind-label').innerText = t.gameWind;
            document.getElementById('game-load-label').innerText = t.gameLoad;
            document.getElementById('game-net-label').innerText = t.gameNet;
            
            document.getElementById('game-gen-name').innerText = t.genName;
            document.getElementById('game-gen-badge').innerText = t.genBadge;
            document.getElementById('game-gen-cost').innerText = t.genCost;

            document.getElementById('res-score-label').innerText = t.resScoreLabel;
            document.getElementById('res-name-label').innerText = t.resNameLabel;
            document.getElementById('player-name').placeholder = t.resNamePlaceholder;
            document.getElementById('res-btn-submit').innerHTML = `${t.resBtnSubmit} <i data-lucide="send" class="w-3.5 h-3.5 ml-1"></i>`;
            document.getElementById('res-btn-restart').innerText = t.resBtnRestart;
            
            document.getElementById('res-stat-sat').innerText = t.statSat;
            document.getElementById('res-stat-car').innerText = t.statCar;
            document.getElementById('res-stat-bat').innerText = t.statBat;

            document.getElementById('global-footer').innerText = t.footer;
            lucide.createIcons();
        }

        // --- 遊戲邏輯 ---
        let state = {
            status: 'intro',
            time: 60,
            battery: 3000,
            maxBattery: 6000,
            solarMod: 1.0,
            windMod: 1.0,
            solarCurrent: 0,
            windCurrent: 100,
            genOn: false,
            satisfaction: 0,
            carbon: 0,
            finalScore: 0,
            facilities: [],
            failReason: ''
        };
        
        let timerInterval = null;
        let eventTimer = 0;

        function initFacilities() {
            state.facilities = FACILITY_CONFIG.map(f => ({ ...f, isOn: true }));
            state.genOn = false;
            updateGenUI();
            renderFacilities();
        }

        function toggleGenerator() {
            if (state.status !== 'playing') return;
            state.genOn = !state.genOn;
            updateGenUI();
            updateDashboard();
        }

        function updateGenUI() {
            const bgFx = document.getElementById('gen-bg-fx');
            const iconBg = document.getElementById('gen-icon-bg');
            const icon = document.getElementById('gen-icon');
            const toggleBg = document.getElementById('gen-toggle-bg');
            const toggleDot = document.getElementById('gen-toggle-dot');

            if (state.genOn) {
                bgFx.classList.remove('hidden');
                iconBg.classList.replace('bg-slate-800/80', 'bg-amber-500');
                iconBg.classList.replace('border-slate-700', 'border-amber-400');
                icon.classList.replace('text-slate-500', 'text-white');
                toggleBg.classList.replace('bg-slate-700', 'bg-amber-500');
                toggleBg.classList.replace('border-slate-600', 'border-amber-400');
                toggleDot.classList.replace('translate-x-0', 'translate-x-4');
                toggleDot.classList.replace('bg-slate-300', 'bg-white');
            } else {
                bgFx.classList.add('hidden');
                iconBg.classList.replace('bg-amber-500', 'bg-slate-800/80');
                iconBg.classList.replace('border-amber-400', 'border-slate-700');
                icon.classList.replace('text-white', 'text-slate-500');
                toggleBg.classList.replace('bg-amber-500', 'bg-slate-700');
                toggleBg.classList.replace('border-amber-400', 'border-slate-600');
                toggleDot.classList.replace('translate-x-4', 'translate-x-0');
                toggleDot.classList.replace('bg-white', 'bg-slate-300');
            }
        }

        function renderFacilities() {
            const container = document.getElementById('facilities-container');
            container.innerHTML = '';
            const t = i18n[currentLang];
            
            state.facilities.forEach((f, index) => {
                const isCriticalBadge = f.critical ? `<span class="bg-rose-500/20 text-rose-400 text-[8px] px-1 py-0.5 rounded font-black border border-rose-500/30 whitespace-nowrap">${t.criticalBadge}</span>` : '';
                const statusColor = f.isOn ? `bg-${f.color}-500 shadow-[0_0_10px_rgba(var(--tw-colors-${f.color}-500),0.5)]` : `bg-slate-700/50`;
                const cardBorder = f.isOn ? `border-${f.color}-500/30` : `border-slate-700/50`;
                const textColor = f.isOn ? `text-white` : `text-slate-500`;
                const iconColor = f.isOn ? `text-white` : `text-slate-500`;
                const cardBg = f.isOn ? `bg-slate-800/80` : `bg-slate-900/50`;

                const html = `
                    <div class="${cardBg} backdrop-blur-md rounded-xl border ${cardBorder} p-2 transition-all duration-300 relative overflow-hidden flex-shrink-0 cursor-pointer hover:border-slate-500 active:scale-[0.98]" onclick="toggleFacility(${index})">
                        <div class="flex justify-between items-center relative z-10">
                            <div class="flex items-center gap-2.5">
                                <div class="${statusColor} w-9 h-9 rounded-lg flex items-center justify-center transition-all duration-300 flex-shrink-0 border ${f.isOn ? 'border-white/20' : 'border-slate-600'}">
                                    <i data-lucide="${f.icon}" class="w-4 h-4 ${iconColor}"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-1.5 mb-0.5 flex-wrap">
                                        <h3 class="font-bold text-sm ${textColor} transition-colors tracking-wide">${f.name[currentLang]}</h3>
                                        ${isCriticalBadge}
                                    </div>
                                    <div class="text-[10px] font-mono ${f.isOn ? 'text-rose-400' : 'text-slate-500'} font-bold">
                                        ${f.isOn ? '-' + f.draw + ' kW' : (!f.critical ? '<span class="text-rose-500 animate-pulse">⚠️ 經濟損失中</span>' : '0 kW')}
                                    </div>
                                </div>
                            </div>
                            <div class="pl-1">
                                <div class="w-10 h-6 rounded-full ${f.isOn ? 'bg-emerald-500 border-emerald-400' : 'bg-slate-700 border-slate-600'} border relative transition-colors shadow-inner flex items-center p-1">
                                    <div class="w-4 h-4 rounded-full ${f.isOn ? 'bg-white' : 'bg-slate-300'} shadow-sm transform transition-transform duration-300 ${f.isOn ? 'translate-x-4' : 'translate-x-0'}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
        }

        function triggerEvent() {
            const events = [
                { id: 'cloudy', solarMod: 0.2, windMod: 1.0, color: 'text-slate-300' },
                { id: 'windy', solarMod: 1.0, windMod: 2.0, color: 'text-cyan-300' },
                { id: 'sunny', solarMod: 1.5, windMod: 0.5, color: 'text-yellow-300' },
                { id: 'nowind', solarMod: 1.0, windMod: 0.1, color: 'text-slate-400' },
                { id: 'stable', solarMod: 1.0, windMod: 1.0, color: 'text-emerald-300' }
            ];
            const evt = events[Math.floor(Math.random() * events.length)];
            
            state.solarMod = evt.solarMod;
            state.windMod = evt.windMod;
            
            const banner = document.getElementById('ui-event-banner');
            const evtText = document.getElementById('ui-event-text');
            const t = i18n[currentLang].events;
            
            if (evt.id === 'stable') {
                banner.classList.add('hidden');
            } else {
                banner.classList.remove('hidden');
                evtText.innerText = t[evt.id];
                evtText.className = `${evt.color}`;
            }
        }

        function toggleFacility(index) {
            if (state.status !== 'playing') return;
            state.facilities[index].isOn = !state.facilities[index].isOn;
            
            if (state.facilities[index].critical && !state.facilities[index].isOn) {
                gameOver('hospital_off');
                return;
            }
            renderFacilities();
            updateDashboard();
        }

        function updateDashboard() {
            let elapsed = 60 - state.time;
            let virtualHour = Math.floor((elapsed / 60) * 24);
            let virtualMin = Math.floor((((elapsed / 60) * 24) % 1) * 60);
            document.getElementById('ui-virtual-time').innerText = 
                String(virtualHour).padStart(2, '0') + ':' + String(virtualMin).padStart(2, '0');
            
            document.getElementById('time-progress-bar').style.width = `${(elapsed/60)*100}%`;

            let sunFactor = Math.sin(Math.PI * (elapsed / 60));
            if (sunFactor < 0) sunFactor = 0;
            state.solarCurrent = Math.floor(sunFactor * 350 * state.solarMod);
            
            const timeIcon = document.getElementById('time-icon');
            if (virtualHour >= 6 && virtualHour < 18) {
                timeIcon.setAttribute('data-lucide', 'sun');
                timeIcon.className = "w-4 h-4 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]";
            } else {
                timeIcon.setAttribute('data-lucide', 'moon');
                timeIcon.className = "w-4 h-4 text-blue-300 drop-shadow-[0_0_5px_rgba(147,197,253,0.8)]";
            }
            lucide.createIcons();

            let totalDraw = 0;
            state.facilities.forEach(f => {
                if (f.isOn) totalDraw += f.draw;
            });
            
            let supply = state.solarCurrent + state.windCurrent;
            if (state.genOn) supply += 200;

            let netPower = Math.floor(supply - totalDraw);
            const t = i18n[currentLang];
            
            document.getElementById('ui-draw').innerText = totalDraw;
            document.getElementById('ui-solar').innerText = state.solarCurrent;
            document.getElementById('ui-wind').innerText = Math.floor(state.windCurrent);
            
            const netEl = document.getElementById('ui-net-power');
            if (netPower >= 0) {
                netEl.innerText = '+' + netPower + ' kW (' + t.statusCharge + ')';
                netEl.className = 'font-mono text-sm tracking-tight font-black text-emerald-400';
            } else {
                netEl.innerText = netPower + ' kW (' + t.statusDischarge + ')';
                netEl.className = 'font-mono text-sm tracking-tight font-black text-rose-400';
            }

            let totalScore = Math.floor(state.satisfaction) - state.carbon;
            document.getElementById('ui-total-score').innerText = totalScore;
            
            document.getElementById('ui-satisfaction').innerHTML = `<i data-lucide="coins" class="w-3 h-3"></i> ${Math.floor(state.satisfaction)}`;
            document.getElementById('ui-carbon').innerHTML = `<i data-lucide="cloud-fog" class="w-3 h-3"></i> -${state.carbon}`;
            lucide.createIcons();

            document.getElementById('ui-battery-text').innerHTML = `<span class="text-slate-200">${Math.floor(state.battery)} / ${state.maxBattery}</span>`;
            
            const pct = Math.max(0, (state.battery / state.maxBattery) * 100);
            const bar = document.getElementById('ui-battery-bar');
            bar.style.width = `${pct}%`;
            
            if (pct > 50) {
                bar.className = 'h-full bg-gradient-to-r from-emerald-500 to-teal-400 w-full transition-all duration-300 shadow-[0_0_10px_rgba(52,211,153,0.5)]';
            } else if (pct > 20) {
                bar.className = 'h-full bg-gradient-to-r from-amber-400 to-yellow-500 w-full transition-all duration-300 shadow-[0_0_10px_rgba(250,204,21,0.5)]';
            } else {
                bar.className = 'h-full bg-gradient-to-r from-rose-500 to-red-600 w-full transition-all duration-300 shadow-[0_0_10px_rgba(244,63,94,0.5)] animate-pulse';
            }
        }

        function gameTick() {
            if (state.status !== 'playing') return;

            let totalDraw = 0;
            state.facilities.forEach(f => { 
                if (f.isOn) {
                    totalDraw += f.draw;
                    if (!f.critical) {
                        state.satisfaction += (f.draw / 10);
                    }
                } else {
                    if (!f.critical) {
                        state.satisfaction -= (f.draw / 15); // 停電造成的經濟損失
                    }
                }
            });

            if (state.genOn) {
                state.carbon += 10;
            }

            if (Math.random() > 0.5) {
                let baseWind = 100 * state.windMod;
                state.windCurrent = Math.max(0, baseWind + (Math.random() * 40 - 20));
            }

            eventTimer++;
            if (eventTimer >= 10) {
                triggerEvent();
                eventTimer = 0;
            }

            let supply = state.solarCurrent + state.windCurrent;
            if (state.genOn) supply += 200;

            let netPower = supply - totalDraw;
            state.battery += netPower;
            if (state.battery > state.maxBattery) state.battery = state.maxBattery;
            
            state.time -= 1;

            if (state.battery <= 0) {
                state.battery = 0;
                updateDashboard();
                gameOver('battery_dead');
                return;
            }

            if (state.time <= 0) {
                state.time = 0;
                updateDashboard();
                victory();
                return;
            }

            updateDashboard();
        }

        function startGame() {
            const intro = document.getElementById('screen-intro');
            const game = document.getElementById('screen-game');
            
            intro.classList.add('fade-out');
            setTimeout(() => {
                intro.style.display = 'none';
                game.style.display = 'flex';
                game.classList.remove('hidden');
                game.classList.add('fade-in');
                
                state.status = 'playing';
                state.time = 60;
                state.battery = 3000;
                state.solarMod = 1.0;
                state.windMod = 1.0;
                state.satisfaction = 0;
                state.carbon = 0;
                state.finalScore = 0;
                state.failReason = '';
                eventTimer = 0;
                document.getElementById('ui-event-banner').classList.add('hidden');
                
                initFacilities();
                updateDashboard();
                
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(gameTick, 1000);
            }, 400);
        }

        function updateResultText() {
            const t = i18n[currentLang];
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');

            if (state.status === 'gameover') {
                title.innerText = t.failTitle;
                if (state.failReason === 'hospital_off') {
                    desc.innerHTML = t.failHospital;
                } else if (state.failReason === 'battery_dead') {
                    desc.innerHTML = t.failBattery;
                }
            } else if (state.status === 'victory') {
                title.innerText = t.successTitle;
                desc.innerHTML = t.successDesc;
            }
        }

        function gameOver(reason) {
            state.status = 'gameover';
            state.failReason = reason;
            clearInterval(timerInterval);
            
            const res = document.getElementById('screen-result');
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const btnRestart = document.getElementById('btn-restart');
            const scoreSec = document.getElementById('score-section');
            
            res.style.display = 'flex';
            res.classList.remove('hidden');
            res.classList.add('fade-in');
            scoreSec.classList.add('hidden');
            btnRestart.classList.remove('hidden');
            
            icon.className = 'w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(244,63,94,0.4)] bg-rose-500/20 text-rose-500 border border-rose-500/50';
            icon.innerHTML = '<i data-lucide="triangle-alert" class="w-8 h-8"></i>';
            title.className = 'text-2xl sm:text-3xl font-black mb-2 text-center text-rose-500 tracking-wide';
            
            updateResultText();
            lucide.createIcons();
        }

        function victory() {
            state.status = 'victory';
            clearInterval(timerInterval);
            
            const res = document.getElementById('screen-result');
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const btnRestart = document.getElementById('btn-restart');
            const scoreSec = document.getElementById('score-section');
            
            res.style.display = 'flex';
            res.classList.remove('hidden');
            res.classList.add('fade-in');
            scoreSec.classList.remove('hidden');
            btnRestart.classList.add('hidden');
            
            icon.className = 'w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(52,211,153,0.4)] bg-emerald-500/20 text-emerald-400 border border-emerald-500/50';
            icon.innerHTML = '<i data-lucide="shield-check" class="w-8 h-8"></i>';
            title.className = 'text-2xl sm:text-3xl font-black mb-2 text-center text-emerald-400 tracking-wide';
            
            let satScore = Math.floor(state.satisfaction);
            let carScore = state.carbon;
            let batBonus = Math.floor(state.battery * 0.1);
            
            state.finalScore = satScore - carScore + batBonus;
            
            document.getElementById('result-score').innerText = state.finalScore;
            document.getElementById('res-val-sat').innerText = `+${satScore}`;
            document.getElementById('res-val-car').innerText = `-${carScore}`;
            document.getElementById('res-val-bat').innerText = `+${batBonus}`;
            
            updateResultText();
            lucide.createIcons();
        }

        function resetGame() {
            document.getElementById('screen-result').style.display = 'none';
            document.getElementById('screen-intro').style.display = 'flex';
            document.getElementById('screen-intro').classList.remove('fade-out');
            document.getElementById('screen-intro').classList.add('fade-in');
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('time-progress-bar').style.width = '0%';
        }

        function submitToFirebase() {
            const t = i18n[currentLang];
            const name = document.getElementById('player-name').value.trim();
            const btn = document.getElementById('btn-submit');
            
            if (!name) {
                alert(t.alertName);
                return;
            }
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
            btn.disabled = true;
            lucide.createIcons();
            
            setTimeout(() => {
                let msg = t.alertSuccess
                    .replace('{0}', name)
                    .replace('{1}', state.finalScore);
                alert(msg);
                
                resetGame();
                btn.innerHTML = `<span id="res-btn-submit">${t.resBtnSubmit}</span> <i data-lucide="send" class="w-3.5 h-3.5 ml-1"></i>`;
                btn.disabled = false;
                document.getElementById('player-name').value = '';
                lucide.createIcons();
            }, 1000);
        }

        // 初始化
        updateStaticText();
    </script>
</body>
</html>
