                helpContent: "<p class='text-slate-100 mb-3 text-center text-sm font-bold tracking-wider'>Next 60s is <span class='text-emerald-400 font-black'>24 Hours</span></p><div class='bg-slate-800/60 p-3 rounded-lg border border-slate-700 text-xs sm:text-sm space-y-2 shadow-inner'><div class='flex items-start gap-2'><span class='text-base leading-none'>☀️</span> <span class='leading-tight'><strong class='text-white'>Day:</strong> Solar charge & keep economy running</span></div><div class='flex items-start gap-2'><span class='text-base leading-none'>🌙</span> <span class='leading-tight'><strong class='text-white'>Night:</strong> Turn off to save power, <strong class='text-rose-400'>expect complaints/loss!</strong></span></div><div class='flex items-start gap-2'><span class='text-base leading-none'>🌍</span> <span class='leading-tight'><strong class='text-white'>Geo:</strong> Baseload power 24/7</span></div><div class='flex items-start gap-2'><span class='text-base leading-none'>⚠️</span> <span class='leading-tight'><strong class='text-amber-400'>Generator:</strong> Power with heavy Carbon penalty</span></div></div><div class='mt-3 pt-3 border-t border-slate-700/50 space-y-1.5 text-left'><p class='text-rose-400 font-bold text-xs sm:text-sm tracking-wide text-center mb-1.5'>❌ Fail: Battery dies OR Hospital loses power</p><p class='text-emerald-400 font-black text-sm tracking-widest drop-shadow-[0_0_8px_rgba(52,211,153,0.5)] text-center'>🏆 How to Win Big:</p><ul class='text-[10px] text-slate-300 list-disc pl-5 space-y-1 font-bold mt-1.5'><li>Keep facilities ON as much as possible.</li><li>Avoid Generator <strong class='text-amber-400'>at all costs</strong>.</li><li>End with high battery for bonuses!</li></ul></div>",
                helpClose: "Got it!", gameTime: "Virtual Time", gameSat: "Performance", gameSolar: "Solar", gameWind: "Wind", gameLoad: "Total Load", gameNet: "ESS Net Flow", statusCharge: "Charge", statusDischarge: "Discharge", genName: "Diesel Generator", genCost: "-40/s", resScoreLabel: "Total Score", resNameLabel: "Commander ID", resNamePlaceholder: "Enter ID", resBtnSubmit: "Publish", resBtnRestart: "Home", statSat: "Econ", statCar: "Carbon", statBat: "Battery", footer: "Energy Economics - Smart Grids | Copyright Protected", failTitle: "Failed", successTitle: "Success!", failHospital: "Hospital cut power!", failBattery: "Battery dead!", successDesc: "Great dispatching!", alertName: "Enter ID!", lbTitle: "Leaderboard", lbLoading: "Loading...", lbEmpty: "No records!",
                lossEconomy: "<span class='text-rose-500 animate-pulse font-bold'>⚠️ Econ Loss</span>", lossComplaint: "<span class='text-amber-500 animate-pulse font-bold'>⚠️ Complaints</span>", lossSociety: "<span class='text-fuchsia-400 animate-pulse font-bold'>⚠️ Society Halt</span>", events: { cloudy: "Clouds!", windy: "Strong Winds!", sunny: "Clear Sky!", nowind: "No Wind!", stable: "Stable" }
            }
        };

        const FACILITY_CONFIG = [
            { id: 'hospital', name: { zh: '地區醫院', en: 'Hospital' }, icon: 'cross', draw: 55, critical: true, color: 'rose', lossType: '' },
            { id: 'gov', name: { zh: '政府機關', en: 'Gov Agency' }, icon: 'landmark', draw: 30, critical: false, color: 'violet', lossType: 'lossSociety' },
            { id: 'finance', name: { zh: '金融機構', en: 'Bank' }, icon: 'briefcase', draw: 25, critical: false, color: 'emerald', lossType: 'lossEconomy' },
            { id: 'transit', name: { zh: '大眾運輸', en: 'Transit' }, icon: 'train', draw: 35, critical: false, color: 'sky', lossType: 'lossComplaint' },
            { id: 'water', name: { zh: '自來水廠', en: 'Water Plant' }, icon: 'droplets', draw: 35, critical: false, color: 'cyan', lossType: 'lossSociety' },
            { id: 'telecom', name: { zh: '通訊基地', en: 'Telecom' }, icon: 'radio-tower', draw: 30, critical: false, color: 'fuchsia', lossType: 'lossSociety' },
            { id: 'factory', name: { zh: '重型工業區', en: 'Factory' }, icon: 'factory', draw: 100, critical: false, color: 'amber', lossType: 'lossEconomy' },
            { id: 'office', name: { zh: '商辦大樓', en: 'Office Bldg' }, icon: 'building', draw: 50, critical: false, color: 'teal', lossType: 'lossEconomy' },
            { id: 'mall', name: { zh: '大型商場', en: 'Mall' }, icon: 'shopping-cart', draw: 70, critical: false, color: 'indigo', lossType: 'lossEconomy' },
            { id: 'residential', name: { zh: '住宅社區', en: 'Residential' }, icon: 'home', draw: 50, critical: false, color: 'slate', lossType: 'lossComplaint' }
        ];

        let state = { status: 'intro', time: 60, battery: 3500, maxBattery: 6000, solarMod: 1.0, windMod: 1.0, geoCurrent: 50, solarCurrent: 0, windCurrent: 100, genOn: false, satisfaction: 0, carbon: 0, finalScore: 0, facilities: [], failReason: '' };
        let timerInterval = null, eventTimer = 0, currentLang = 'zh';

        const fbConfig = { apiKey: "AIzaSyBWcBJ3gxzBm58g63n2N8mvjilvs7lBpEo", authDomain: "smartgrid-9d95d.firebaseapp.com", projectId: "smartgrid-9d95d", storageBucket: "smartgrid-9d95d.firebasestorage.app", messagingSenderId: "767548979863", appId: "1:767548979863:web:b6ed9d33c61ed8ac7347d2" };
        const app = initializeApp(fbConfig), auth = getAuth(app), db = getFirestore(app);
        let fbUser = null; signInAnonymously(auth).catch(e => console.error(e)); onAuthStateChanged(auth, u => { fbUser = u; });

        window.toggleLang = () => { currentLang = currentLang === 'zh' ? 'en' : 'zh'; document.getElementById('lang-btn-text').innerText = currentLang === 'zh' ? 'EN' : '中'; updateStaticText(); if(state.status === 'playing') renderFacilities(); };
        window.openHelp = () => { const m = document.getElementById('help-modal'); m.classList.remove('hidden'); m.classList.add('flex', 'fade-in'); if (state.status === 'playing' && timerInterval) { clearInterval(timerInterval); timerInterval = null; } updateStaticText(); };
        window.closeHelp = () => { const m = document.getElementById('help-modal'); m.classList.add('hidden'); m.classList.remove('flex', 'fade-in'); if (state.status === 'playing' && !timerInterval) { timerInterval = setInterval(gameTick, 1000); } };
        window.toggleFacility = (i) => { if (state.status !== 'playing') return; state.facilities[i].isOn = !state.facilities[i].isOn; if (state.facilities[i].critical && !state.facilities[i].isOn) { gameOver('hospital_off'); return; } renderFacilities(); updateDashboard(); };
        window.toggleGenerator = () => { if (state.status !== 'playing') return; state.genOn = !state.genOn; updateGenUI(); updateDashboard(); };
        window.startGame = () => { const i = document.getElementById('screen-intro'), g = document.getElementById('screen-game'); i.classList.add('fade-out'); setTimeout(() => { i.style.display = 'none'; g.style.display = 'flex'; g.classList.remove('hidden'); g.classList.add('fade-in'); state.status = 'playing'; state.time = 60; state.battery = 3500; state.solarMod = 1.0; state.windMod = 1.0; state.satisfaction = 0; state.carbon = 0; state.finalScore = 0; state.failReason = ''; eventTimer = 0; initFacilities(); updateDashboard(); if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(gameTick, 1000); }, 400); };
        window.resetGame = () => { location.reload(); };

        function initFacilities() { state.facilities = FACILITY_CONFIG.map(f => ({ ...f, isOn: true })); state.genOn = false; updateGenUI(); renderFacilities(); }
        function updateGenUI() { const b = document.getElementById('gen-bg-fx'), i = document.getElementById('gen-icon-bg'), ic = document.getElementById('gen-icon'), tb = document.getElementById('gen-toggle-bg'), td = document.getElementById('gen-toggle-dot'); if (state.genOn) { b.classList.remove('hidden'); i.classList.replace('bg-slate-800/80', 'bg-amber-500'); ic.setAttribute('class', 'w-5 h-5 text-white transition-colors'); tb.classList.replace('bg-slate-700', 'bg-amber-500'); td.style.transform = 'translateX(20px)'; td.classList.replace('bg-slate-300', 'bg-white'); } else { b.classList.add('hidden'); i.classList.replace('bg-amber-500', 'bg-slate-800/80'); ic.setAttribute('class', 'w-5 h-5 text-slate-500 transition-colors'); tb.classList.replace('bg-amber-500', 'bg-slate-700'); td.style.transform = 'translateX(0px)'; td.classList.replace('bg-white', 'bg-slate-300'); } }
        function renderFacilities() { const c = document.getElementById('facilities-container'), t = i18n[currentLang]; c.innerHTML = ''; state.facilities.forEach((f, i) => { const s = f.isOn ? `bg-${f.color}-500 shadow-[0_0_8px_rgba(var(--tw-colors-${f.color}-500),0.5)]` : `bg-slate-700/50`; const cb = f.isOn ? `bg-slate-800/90` : `bg-slate-900/60`; const h = `<div class="${cb} backdrop-blur-md rounded-xl border border-white/5 p-1.5 transition-all duration-300 relative overflow-hidden cursor-pointer active:scale-[0.98]" onclick="toggleFacility(${i})"><div class="flex flex-col relative z-10"><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-1.5"><div class="${s} w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0"><i data-lucide="${f.icon}" class="w-3.5 h-3.5 text-white"></i></div><h3 class="font-bold text-[10px] text-white truncate max-w-[60px]">${f.name[currentLang]}</h3></div><div class="w-7 h-4 rounded-full ${f.isOn ? 'bg-emerald-500' : 'bg-slate-700'} relative p-0.5 border border-slate-600"><div class="w-3 h-3 rounded-full bg-white transition-transform duration-300" style="transform:translateX(${f.isOn ? '12px' : '0px'})"></div></div></div><div class="text-[9px] font-mono ${f.isOn ? 'text-rose-400' : 'text-slate-500'} font-bold">${f.isOn ? '-' + f.draw + ' kW' : (!f.critical ? t[f.lossType] : '0 kW')}</div></div>${!f.isOn ? '<div class="absolute inset-0 bg-slate-900/40 z-0"></div>' : ''}</div>`; c.insertAdjacentHTML('beforeend', h); }); lucide.createIcons(); }
        
        function updateDashboard() {
            let e = 60 - state.time, vh = (e / 60) * 24;
            document.getElementById('ui-virtual-time').innerText = String(Math.floor(vh)).padStart(2, '0') + ':' + String(Math.floor((vh % 1) * 60)).padStart(2, '0');
            document.getElementById('ui-real-time').innerText = state.time + 's';
            document.getElementById('time-progress-bar').style.width = `${(e/60)*100}%`;
            let sf = (vh >= 6 && vh <= 18) ? Math.sin(Math.PI * (vh - 6) / 12) : 0;
            state.solarCurrent = Math.floor(sf * 480 * state.solarMod);
            const ti = document.getElementById('time-icon');
            ti.setAttribute('data-lucide', (vh >= 6 && vh < 18) ? 'sun' : 'moon');
            ti.setAttribute('class', `w-5 h-5 ${(vh >= 6 && vh < 18) ? 'text-yellow-400' : 'text-blue-300'}`);
            lucide.createIcons();
            let td = 0; state.facilities.forEach(f => { if (f.isOn) td += f.draw; });
            document.getElementById('ui-solar').innerText = state.solarCurrent;
            document.getElementById('ui-wind').innerText = Math.floor(state.windCurrent);
            document.getElementById('ui-geo').innerText = state.geoCurrent;
            document.getElementById('ui-draw').innerText = td;
            let net = Math.floor((state.solarCurrent + state.windCurrent + state.geoCurrent + (state.genOn ? 200 : 0)) - td);
            const ne = document.getElementById('ui-net-power'); ne.innerText = (net >= 0 ? '+' : '') + net + ' kW'; ne.className = `font-mono text-base tracking-tight font-black ${net >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            let ts = Math.floor(state.satisfaction) - state.carbon; document.getElementById('ui-total-score').innerText = ts;
            const sd = document.getElementById('ui-score-display'); sd.className = `text-xl sm:text-2xl font-black font-mono flex items-center gap-1 ${ts < 0 ? 'text-rose-500' : 'text-emerald-400'}`;
            document.getElementById('ui-battery-text').innerHTML = `<span class="text-slate-200 font-black">${Math.floor(state.battery)} / 6000</span> kWh`;
            const pct = (state.battery / 6000) * 100, bar = document.getElementById('ui-battery-bar'); bar.style.width = `${pct}%`;
            bar.className = `h-full bg-gradient-to-r ${pct > 50 ? 'from-emerald-500 to-teal-400' : pct > 20 ? 'from-amber-400 to-yellow-500' : 'from-rose-500 to-red-600 animate-pulse'} w-full transition-all duration-300 rounded-r-full`;
        }

        function gameTick() {
            if (state.status !== 'playing') return;
            state.facilities.forEach(f => { if (f.isOn) { if (!f.critical) state.satisfaction += (f.draw / 10); } else { if (!f.critical) state.satisfaction -= (f.draw / 15); } });
            if (state.genOn) state.carbon += 40; // 加重懲罰：-40 pts/s
            state.windCurrent = Math.max(0, (100 * state.windMod) + (Math.random() * 40 - 20));
            eventTimer++; if (eventTimer >= 10) { triggerEvent(); eventTimer = 0; }
            let net = (state.solarCurrent + state.windCurrent + state.geoCurrent + (state.genOn ? 200 : 0)) - state.facilities.reduce((a,f)=>a+(f.isOn?f.draw:0),0);
            state.battery = Math.min(6000, Math.max(0, state.battery + net)); state.time--;
            if (state.battery <= 0) { gameOver('battery_dead'); return; }
            if (state.time <= 0) { victory(); return; }
            updateDashboard();
        }

        function gameOver(r) { state.status = 'gameover'; state.failReason = r; clearInterval(timerInterval); const s = document.getElementById('screen-result'); s.style.display = 'flex'; s.classList.remove('hidden'); s.classList.add('fade-in'); document.getElementById('score-section').classList.add('hidden'); document.getElementById('btn-restart').classList.remove('hidden'); const i = document.getElementById('result-icon'); i.className = 'w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-rose-500/20 text-rose-500 border border-rose-500/50'; i.innerHTML = '<i data-lucide="triangle-alert" class="w-10 h-10"></i>'; document.getElementById('result-title').className = 'text-3xl font-black mb-2 text-center text-rose-500'; updateResultText(); lucide.createIcons(); }
        function victory() { state.status = 'victory'; clearInterval(timerInterval); const s = document.getElementById('screen-result'); s.style.display = 'flex'; s.classList.remove('hidden'); s.classList.add('fade-in'); document.getElementById('score-section').classList.remove('hidden'); document.getElementById('btn-restart').classList.add('hidden'); const i = document.getElementById('result-icon'); i.className = 'w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-emerald-500/20 text-emerald-400 border border-emerald-500/50'; i.innerHTML = '<i data-lucide="shield-check" class="w-10 h-10"></i>'; document.getElementById('result-title').className = 'text-3xl font-black mb-2 text-center text-emerald-400'; let ss = Math.floor(state.satisfaction), cs = state.carbon, bb = Math.floor(state.battery * 0.1); state.finalScore = ss - cs + bb; document.getElementById('result-score').innerText = state.finalScore; document.getElementById('res-val-sat').innerText = `+${ss}`; document.getElementById('res-val-car').innerText = `-${cs}`; document.getElementById('res-val-bat').innerText = `+${bb}`; updateResultText(); lucide.createIcons(); }
        function triggerEvent() { const evs = [{id:'cloudy',sm:0.2,wm:1,c:'text-slate-300'},{id:'windy',sm:1,wm:2,c:'text-cyan-300'},{id:'sunny',sm:1.5,wm:0.5,c:'text-yellow-300'},{id:'nowind',sm:1,wm:0.1,c:'text-slate-400'},{id:'stable',sm:1,wm:1,c:'text-emerald-300'}]; const ev = evs[Math.floor(Math.random()*evs.length)]; state.solarMod = ev.sm; state.windMod = ev.wm; const b = document.getElementById('ui-event-banner'); if (ev.id==='stable'){ b.classList.add('hidden'); } else { b.classList.remove('hidden'); document.getElementById('ui-event-text').innerText = i18n[currentLang].events[ev.id]; b.className = `hidden text-[9px] px-1.5 py-0.5 rounded bg-slate-800 border border-slate-600 font-bold ${ev.c}`; b.classList.remove('hidden'); } }

        window.submitToFirebase = async () => { const t = i18n[currentLang], n = document.getElementById('player-name').value.trim(), b = document.getElementById('btn-submit'); if (!n) { alert(t.alertName); return; } b.disabled = true; try { await addDoc(collection(db, 'leaderboard'), { name: n, score: state.finalScore, batteryLeft: Math.floor(state.battery), timestamp: serverTimestamp() }); document.getElementById('screen-result').style.display = 'none'; openLeaderboard(); } catch(e) { alert("Error: " + e.message); b.disabled = false; } };
        let lbU = null; window.openLeaderboard = () => { document.getElementById('screen-intro').style.display = 'none'; const s = document.getElementById('screen-leaderboard'); s.classList.remove('hidden'); s.classList.add('flex', 'fade-in'); lbU = onSnapshot(collection(db, 'leaderboard'), (sn) => { const l = document.getElementById('leaderboard-list'); if (sn.empty) { l.innerHTML = `<div class="text-slate-500 text-center">${i18n[currentLang].lbEmpty}</div>`; return; } let rs = []; sn.forEach(d => rs.push(d.data())); rs.sort((a,b)=>b.score-a.score || b.batteryLeft-a.batteryLeft); rs = rs.slice(0,10); l.innerHTML = ''; rs.forEach((r, idx) => { const c = idx === 0 ? 'text-yellow-400' : (idx === 1 ? 'text-slate-300' : (idx === 2 ? 'text-amber-600' : 'text-slate-500')); l.innerHTML += `<div class="bg-slate-800/80 p-4 rounded-xl flex items-center justify-between"><div class="flex items-center gap-4"><div class="w-8 font-black ${c} text-xl">#${idx+1}</div><div class="font-bold text-slate-200 text-base">${r.name}</div></div><div class="font-mono font-black text-emerald-400 text-xl">${r.score}</div></div>`; }); }); };
        window.closeLeaderboard = () => { document.getElementById('screen-leaderboard').classList.add('hidden'); if(lbU) lbU(); document.getElementById('screen-intro').style.display='flex'; };
        
        function updateStaticText() { const t = i18n[currentLang]; document.getElementById('intro-subtitle').innerHTML = t.introSubtitle; document.getElementById('intro-btn-text').innerText = t.introBtn; document.getElementById('intro-btn-rank').innerText = t.introRank; document.getElementById('help-content').innerHTML = t.helpContent; document.getElementById('game-time-label').innerText = t.gameTime; document.getElementById('game-score-title').innerText = t.gameSat; document.getElementById('game-solar-label').innerText = t.gameSolar; document.getElementById('game-wind-label').innerText = t.gameWind; document.getElementById('game-load-label').innerText = t.gameLoad; document.getElementById('game-net-label').innerText = t.gameNet; document.getElementById('game-gen-name').innerText = t.genName; document.getElementById('game-gen-cost').innerText = t.genCost; document.getElementById('res-score-label').innerText = t.resScoreLabel; document.getElementById('res-name-label').innerText = t.resNameLabel; document.getElementById('player-name').placeholder = t.resNamePlaceholder; document.getElementById('res-btn-submit-text').innerText = t.resBtnSubmit; document.getElementById('res-btn-restart').innerText = t.resBtnRestart; document.getElementById('global-footer').innerText = t.footer; lucide.createIcons(); }
        function updateResultText() { const t = i18n[currentLang], ti = document.getElementById('result-title'), d = document.getElementById('result-desc'); if (state.status === 'gameover') { ti.innerText = t.failTitle; d.innerHTML = (state.failReason === 'hospital_off') ? t.failHospital : t.failBattery; } else { ti.innerText = t.successTitle; d.innerHTML = t.successDesc; } }
        
        const params = new URLSearchParams(window.location.search);
        if(params.has('rank')) { window.onload = () => { openLeaderboard(); document.getElementById('global-help-btn').style.display='none'; }; }
        updateStaticText();
    </script>
