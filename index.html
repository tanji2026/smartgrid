        function updateDashboard() {
            let elapsed = 60 - state.time;
            let virtualHour = (elapsed / 60) * 24;
            let displayHour = Math.floor(virtualHour);
            let displayMin = Math.floor((virtualHour % 1) * 60);
            document.getElementById('ui-virtual-time').innerText = String(displayHour).padStart(2, '0') + ':' + String(displayMin).padStart(2, '0');
            document.getElementById('ui-real-time').innerText = state.time + 's';
            document.getElementById('time-progress-bar').style.width = `${(elapsed/60)*100}%`;
            
            let sunFactor = 0;
            if (virtualHour >= 6 && virtualHour <= 18) {
                sunFactor = Math.sin(Math.PI * (virtualHour - 6) / 12);
            }
            state.solarCurrent = Math.floor(sunFactor * 480 * state.solarMod);
            
            const timeIcon = document.getElementById('time-icon');
            if (virtualHour >= 6 && virtualHour < 18) {
                timeIcon.setAttribute('data-lucide', 'sun');
                timeIcon.setAttribute('class', 'w-5 h-5 sm:w-6 sm:h-6 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]');

            }
            lucide.createIcons();
            
            let totalDraw = 0;
            state.facilities.forEach(f => { if (f.isOn) totalDraw += f.draw; });
            
            document.getElementById('ui-solar').innerText = state.solarCurrent;
            document.getElementById('ui-wind').innerText = Math.floor(state.windCurrent);
            document.getElementById('ui-geo').innerText = state.geoCurrent;
            document.getElementById('ui-draw').innerText = totalDraw;

            let supply = state.solarCurrent + state.windCurrent + state.geoCurrent;
            if (state.genOn) supply += 200;
            let netPower = Math.floor(supply - totalDraw);
            
            const netEl = document.getElementById('ui-net-power');
            if (netPower >= 0) { 
                netEl.innerText = '+' + netPower + ' kW'; 
                netEl.className = 'font-mono text-base tracking-tight font-black text-emerald-400';

            let totalScore = Math.floor(state.satisfaction) - state.carbon;
            document.getElementById('ui-total-score').innerText = totalScore;
            
            const scoreDisplay = document.getElementById('ui-score-display');
            const scoreUnit = document.getElementById('ui-score-unit');
            if (totalScore < 0) {
                scoreDisplay.classList.replace('text-emerald-400', 'text-rose-500');
                scoreUnit.classList.replace('text-emerald-600', 'text-rose-600');
            } else {
                scoreDisplay.classList.replace('text-rose-500', 'text-emerald-400');
                scoreUnit.classList.replace('text-rose-600', 'text-emerald-600');
            }

            const pct = Math.max(0, (state.battery / state.maxBattery) * 100);
            const bar = document.getElementById('ui-battery-bar');
            bar.style.width = `${pct}%`;
            if (pct > 50) { bar.className = 'h-full bg-gradient-to-r from-emerald-500 to-teal-400 w-full transition-all duration-300 shadow-[0_0_12px_rgba(52,211,153,0.8)] rounded-r-full'; }

            else { bar.className = 'h-full bg-gradient-to-r from-rose-500 to-red-600 w-full transition-all duration-300 shadow-[0_0_12px_rgba(244,63,94,0.8)] animate-pulse rounded-r-full'; }
        }

        function gameTick() {
            if (state.status !== 'playing') return;
            let totalDraw = 0;
            state.facilities.forEach(f => { 
                if (f.isOn) { 
                    totalDraw += f.draw; 
                    if (!f.critical) state.satisfaction += (f.draw / 10); 
                } else { 
                    if (!f.critical) state.satisfaction -= (f.draw / 15); 
                } 
            });
            if (state.genOn) state.carbon += 10;
            if (Math.random() > 0.5) { 
                let baseWind = 100 * state.windMod; 
                state.windCurrent = Math.max(0, baseWind + (Math.random() * 40 - 20)); 
            }
            eventTimer++; 
            if (eventTimer >= 10) { triggerEvent(); eventTimer = 0; }
            
            let supply = state.solarCurrent + state.windCurrent + state.geoCurrent; 
            if (state.genOn) supply += 200;
            let netPower = supply - totalDraw; 
            state.battery += netPower; 
            if (state.battery > state.maxBattery) state.battery = state.maxBattery;
            
            state.time -= 1;
            if (state.battery <= 0) { state.battery = 0; updateDashboard(); gameOver('battery_dead'); return; }
            if (state.time <= 0) { state.time = 0; updateDashboard(); victory(); return; }
            updateDashboard();
        }

            document.getElementById('game-load-label').innerText = t.gameLoad;
            document.getElementById('game-net-label').innerText = t.gameNet;
            document.getElementById('game-gen-name').innerText = t.genName;
            document.getElementById('game-gen-cost').innerText = t.genCost;
            document.getElementById('res-score-label').innerText = t.resScoreLabel;
            document.getElementById('res-name-label').innerText = t.resNameLabel;
            document.getElementById('player-name').placeholder = t.resNamePlaceholder;
            document.getElementById('res-btn-submit-text').innerText = t.resBtnSubmit;
            document.getElementById('res-btn-restart').innerText = t.resBtnRestart;
            document.getElementById('res-stat-sat').innerText = t.statSat;
            document.getElementById('res-stat-car').innerText = t.statCar;
            document.getElementById('res-stat-bat').innerText = t.statBat;
            document.getElementById('global-footer').innerText = t.footer;
            document.getElementById('lb-title').innerHTML = `<i data-lucide="trophy" class="w-5 h-5 text-emerald-400"></i> ${t.lbTitle}`;
            lucide.createIcons();
        }

        function updateResultText() {
            const t = i18n[currentLang]; const title = document.getElementById('result-title'); const desc = document.getElementById('result-desc');
            if (state.status === 'gameover') { title.innerText = t.failTitle; if (state.failReason === 'hospital_off') desc.innerHTML = t.failHospital; else if (state.failReason === 'battery_dead') desc.innerHTML = t.failBattery; } else if (state.status === 'victory') { title.innerText = t.successTitle; desc.innerHTML = t.successDesc; }
        }

        updateStaticText();
    </script>
</body>
</html>
